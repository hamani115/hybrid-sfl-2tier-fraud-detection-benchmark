hydra:
  run:
    dir: outputs/creditcard/splitfedv2_c4_alpha0.5_seed30_r50_splitblock2_run26225
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.run.dir=outputs/creditcard/splitfedv2_c4_alpha0.5_seed30_r50_splitblock2_run26225
    - hydra.mode=RUN
    task:
    - dataset=creditcard
    - model=fraud_mlp
    - partitioning=creditcard_dirichlet
    - partitioning.num_partitions=4
    - partitioning.alpha=0.5
    - algorithm=splitfedv2
    - algorithm.model.last_client_layer=block2
    - general.seed=30
    - general.num_rounds=50
    - client_train_config.lte=1
    - client_train_config.batch_size=512
    - optimizer=adam
    - optimizer.lr=0.001
    - optimizer.weight_decay=0.00001
    - strategy_config.fraction_fit=1.0
    - strategy_config.fraction_evaluate=1.0
    - loss.class_weight=[1.0,50.0]
    - communication.embedding_dim=32
    - communication.bytes_per_float=4
    - +num_clients=4
    - +split_point=block2
  job:
    name: run_general_client
    chdir: null
    override_dirname: +num_clients=4,+split_point=block2,algorithm.model.last_client_layer=block2,algorithm=splitfedv2,client_train_config.batch_size=512,client_train_config.lte=1,communication.bytes_per_float=4,communication.embedding_dim=32,dataset=creditcard,general.num_rounds=50,general.seed=30,loss.class_weight=[1.0,50.0],model=fraud_mlp,optimizer.lr=0.001,optimizer.weight_decay=0.00001,optimizer=adam,partitioning.alpha=0.5,partitioning.num_partitions=4,partitioning=creditcard_dirichlet,strategy_config.fraction_evaluate=1.0,strategy_config.fraction_fit=1.0
    id: ???
    num: ???
    config_name: multialgo_config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /scratch-beegfs/datasets/aalmarzouqi/hybrid-sfl-2tier-fraud-detection-benchmark
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /scratch-beegfs/datasets/aalmarzouqi/hybrid-sfl-2tier-fraud-detection-benchmark/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /scratch-beegfs/datasets/aalmarzouqi/hybrid-sfl-2tier-fraud-detection-benchmark/outputs/creditcard/splitfedv2_c4_alpha0.5_seed30_r50_splitblock2_run26225
    choices:
      device_capacities: simulation
      optimizer: adam
      model: fraud_mlp
      dataset: creditcard
      algorithm: splitfedv2
      partitioning: creditcard_dirichlet
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
